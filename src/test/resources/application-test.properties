# ===== Профиль тестов =====
# Datasource задаётся динамически в AbstractIntegrationTest (Testcontainers или -Dtest.db=local).

# Обязательный админ для контекста Security
app.admins=admin:admin

# Telegram выключен (пустой токен) — никаких внешних вызовов из тестов
app.telegram.bot-token=
app.telegram.chat-id=

# Низкий лимит, чтобы быстро проверять 429 (тесты используют разные IP, чтобы не мешать друг другу)
app.rate-limit.max-requests=3
app.rate-limit.window-minutes=10

# Шаблоны без кэша
spring.thymeleaf.cache=false

# Тише в тестовом выводе
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=WARN
logging.level.com.poemorder=DEBUG
