spring.application.name=poemorder

# ====== server ======
server.port=${SERVER_PORT:8081}
server.address=0.0.0.0
# X-Forwarded-* headers are handled by ForwardedHeaderFilter (reverse proxy in front)
server.forward-headers-strategy=framework

# ====== datasource ======
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/poems}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:poems}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:poems}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000

# ====== JPA ======
# Schema is owned by Flyway, Hibernate must never touch DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ====== Flyway ======
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ====== Thymeleaf ======
# Production default: cache on. Set THYMELEAF_CACHE=false for local template live-reload
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# ====== admin users ======
# Required. Format: user:pass,user2:pass2 (passwords are Argon2-hashed at startup)
app.admins=${APP_ADMINS:}

# ====== branding ======
# Имя автора в шапке/футере публичных страниц
app.author-name=${APP_AUTHOR_NAME:Алексей Боков}

# ====== telegram notifications (optional) ======
# Empty token = notifications disabled
app.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
app.telegram.chat-id=${TELEGRAM_CHAT_ID:}

# ====== rate limit for public form submissions ======
app.rate-limit.max-requests=${RATE_LIMIT_MAX:5}
app.rate-limit.window-minutes=${RATE_LIMIT_WINDOW_MINUTES:10}

# ====== actuator ======
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ====== errors: never leak internals to users ======
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

# ====== logging ======
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
